; Luso8 — Asterisk HTTP Server Configuration
; ARI REST API and WebSocket run on this server.
; Template variables substituted by docker/entrypoint.sh via envsubst.

[general]
enabled = yes
bindaddr = ${ARI_BIND_ADDR}
bindport = ${ARI_PORT}

; Uncomment to enable HTTPS (strongly recommended in production)
;tlsenable = yes
;tlsbindaddr = 0.0.0.0:8089
;tlscertfile = /etc/asterisk/keys/fullchain.pem
;tlsprivatekey = /etc/asterisk/keys/privkey.pem
