; Luso8 — Music on Hold Configuration
; Played to callers waiting in queue or placed on hold.

[general]
cachertclasses = yes

[default]
mode = files
directory = /var/lib/asterisk/moh
random = yes
; To stream from an external URL:
;mode = custom
;application = /usr/bin/mpg123 -q -r 8000 -f 8192 -b 2048 --mono -s http://your-moh-stream.com/hold
