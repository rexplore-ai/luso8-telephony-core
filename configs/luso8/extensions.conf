; Luso8 — Dialplan Configuration
; Routes all inbound calls through Voxtra (Stasis app).
; Template variables substituted by docker/entrypoint.sh via envsubst.

;=============================================================================
; INBOUND FROM CARRIER
; All calls from the SIP trunk land here.
; Voxtra handles everything once Stasis() is entered.
;=============================================================================
[from-carrier]
exten = _X.,1,NoOp(Luso8 inbound: ${CALLERID(num)} to ${EXTEN})
 same = n,Set(CALL_DIRECTION=inbound)
 same = n,Set(CALL_START_TIME=${EPOCH})
 same = n,Set(REC_FILENAME=default_${UNIQUEID}_${CALLERID(num)}_${STRFTIME(%Y%m%d-%H%M%S,,%Y%m%d-%H%M%S)}.wav)
 same = n,MixMonitor(${REC_FILENAME},b)
 same = n,Stasis(${ARI_APP_NAME})
 same = n,Hangup()

; Fallback if Voxtra rejects or errors
exten = failed,1,Playback(sorry-cant-take-call)
 same = n,Hangup()

;=============================================================================
; OUTBOUND VIA VOXTRA (AI-originated calls)
; ARI originate sends calls here. Routes out through the SIP trunk.
;=============================================================================
[from-voxtra]
exten = _+X.,1,NoOp(Luso8 outbound AI call to ${EXTEN})
 same = n,Set(CALLERID(num)=${OUTBOUND_CALLER_ID})
 same = n,Dial(PJSIP/${EXTEN}@trunk-endpoint,,rU(${OUTBOUND_CALLER_ID}))
 same = n,Hangup()

; Local extension format (no +)
exten = _X.,1,NoOp(Luso8 outbound AI call to ${EXTEN})
 same = n,Set(CALLERID(num)=${OUTBOUND_CALLER_ID})
 same = n,Dial(PJSIP/${EXTEN}@trunk-endpoint,,rU(${OUTBOUND_CALLER_ID}))
 same = n,Hangup()

;=============================================================================
; HUMAN AGENT QUEUES
; Voxtra calls session.transfer_to_queue("support") → lands here.
; Queue members (human agents) must be added via AMI or Luso8 UI.
;=============================================================================
[agent-queues]
exten = support,1,NoOp(Luso8 queue: support — from ${CALLERID(num)})
 same = n,Queue(support,,,,300)
 same = n,Playback(all-agents-busy)
 same = n,Hangup()

exten = sales,1,NoOp(Luso8 queue: sales — from ${CALLERID(num)})
 same = n,Queue(sales,,,,300)
 same = n,Hangup()

exten = billing,1,NoOp(Luso8 queue: billing — from ${CALLERID(num)})
 same = n,Queue(billing,,,,300)
 same = n,Hangup()

;=============================================================================
; INTERNAL HUMAN AGENT EXTENSIONS
; Used by softphones / Luso8 web agent console (WebRTC).
;=============================================================================
[from-internal]
exten = _1XXX,1,Dial(PJSIP/${EXTEN},,rU(${CALLERID(num)}))
 same = n,Hangup()

; Agent dials into queue manually
exten = 2000,1,Queue(support)
 same = n,Hangup()
exten = 2001,1,Queue(sales)
 same = n,Hangup()
exten = 2002,1,Queue(billing)
 same = n,Hangup()

;=============================================================================
; PER-TENANT DIALPLAN FRAGMENTS
; Generated by Voxtra TenantProvisioner for each Luso8 customer.
; Each file: /etc/asterisk/extensions.d/<tenant_id>.conf
;=============================================================================
#include extensions.d/*.conf
