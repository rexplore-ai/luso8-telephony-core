; Luso8 — Call Queue Configuration
; Human agent queues for AI-to-human handoff.

[general]
persistmembers = yes
monitor-type = MixMonitor
log-membername = yes
shared_lastcall = yes

;=============================================================================
; SUPPORT QUEUE
;=============================================================================
[support]
strategy = leastrecent
timeout = 30
retry = 5
maxlen = 50
announce-frequency = 60
announce-holdtime = yes
announce-position = yes
music = default
joinempty = yes
leavewhenempty = no
reportholdtime = yes
memberdelay = 0
weight = 0
; Callers waiting more than 10 minutes get a callback offer
;servicelevel = 600

;=============================================================================
; SALES QUEUE
;=============================================================================
[sales]
strategy = leastrecent
timeout = 30
retry = 5
maxlen = 50
announce-frequency = 60
announce-holdtime = yes
announce-position = yes
music = default
joinempty = yes
leavewhenempty = no

;=============================================================================
; BILLING QUEUE
;=============================================================================
[billing]
strategy = ringall
timeout = 30
retry = 5
maxlen = 20
music = default
joinempty = yes
leavewhenempty = no
