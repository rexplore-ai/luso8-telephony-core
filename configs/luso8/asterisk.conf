; Luso8 — Asterisk Core Configuration
; Controls directories, run-time limits, and process settings.

[directories](!)
astetcdir => /etc/asterisk
astmoddir => /usr/lib/asterisk/modules
astvarlibdir => /var/lib/asterisk
astdbdir => /var/lib/asterisk
astkeydir => /var/lib/asterisk
astdatadir => /var/lib/asterisk
astagidir => /var/lib/asterisk/agi-bin
astspooldir => /var/spool/asterisk
astrundir => /var/run/asterisk
astlogdir => /var/log/asterisk
astsbindir => /usr/sbin

[options]
; Run as asterisk user (set in systemd or Docker entrypoint)
;runuser = asterisk
;rungroup = asterisk

; Disable verbose by default — controlled via logger.conf
verbose = 0
debug = 0

; Documentation language
documentation_language = en_US

; Maximum open file descriptors
; Each call uses ~3 fds — set high for large deployments
;maxfiles = 65536

; Don't dump core on crash (enable only for debugging)
;dumpcore = no

; Transmit silence when no audio — prevents one-way audio issues
transmit_silence = yes

; Stop processing dialplan on non-existent context (security)
hideconnect = yes

; Don't allow remote console without authentication
;remoteconsoleusers = root

[compat]
; Use new-style empty application args
pbx_realtime = 1.6
res_agi = 1.6
app_set = 1.6
