; Luso8 — RTP Media Port Configuration
; Template variables substituted by docker/entrypoint.sh via envsubst.
;
; FIREWALL NOTE: RTP_PORT_START through RTP_PORT_END must be open
; as UDP on your server/GCE firewall rules for audio to work.

[general]
rtpstart = ${RTP_PORT_START}
rtpend = ${RTP_PORT_END}

; ICE/STUN (enable for WebRTC browser-based agents)
;icesupport = yes
;stunaddr = stun.l.google.com:19302

; Strict RTP: only accept media from the expected source IP/port
; Recommended for production to prevent RTP injection attacks
strictrtp = yes
probation = 4

; Packet timeout (milliseconds) — hang up if no RTP received
; Useful to detect dead calls when carrier drops the connection silently
;rtptimeout = 60
;rtpholdtimeout = 300
