; Luso8 — Logger Configuration
; Template variables substituted by docker/entrypoint.sh via envsubst.

[general]
rotatestrategy = rotate
exec_after_rotate = gzip -9 ${filename}.2
dateformat = %F %T

[logfiles]
; Console — mirrors to Docker stdout when running in container
console = ${LOG_LEVEL},notice,warning,error

; Main log — errors and notices only in production
messages = notice,warning,error

; Security log — always on (failed auth, SIP scanning attempts)
security = security

; Full debug log — DISABLE in production (very large files, performance impact)
; Uncomment only during troubleshooting
;debug = debug,verbose(5),notice,warning,error,dtmf,fax
