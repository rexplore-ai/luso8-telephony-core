; Luso8 — Asterisk REST Interface (ARI) Configuration
; Template variables substituted by docker/entrypoint.sh via envsubst.

[general]
enabled = yes
pretty = no
allowed_origins = *

; Load per-tenant ARI users from individual fragment files
; (generated by Voxtra TenantProvisioner)
#include ari.d/*.conf

; ---- Master ARI user (used by Luso8 Cloud backend for provisioning) ----
[${ARI_USERNAME}]
type = user
password = ${ARI_PASSWORD}
password_format = plain
