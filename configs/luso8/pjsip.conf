; Luso8 — PJSIP Configuration
; SIP transport, trunk registration, and endpoint definitions.
; Template variables substituted by docker/entrypoint.sh via envsubst.
;
; Required environment variables:
;   EXTERNAL_IP, LOCAL_NET, SIP_TRUNK_HOST, SIP_TRUNK_PORT,
;   SIP_TRUNK_USER, SIP_TRUNK_PASS, SIP_TRUNK_REALM,
;   DEFAULT_CONTEXT, OUTBOUND_CALLER_ID, ARI_PASSWORD

;=============================================================================
; TRANSPORT
;=============================================================================

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; NAT traversal — required for VPS/GCE deployments behind NAT
local_net = ${LOCAL_NET}
external_media_address = ${EXTERNAL_IP}
external_signaling_address = ${EXTERNAL_IP}

;=============================================================================
; SIP TRUNK — PRIMARY CARRIER
;=============================================================================

[trunk-reg]
type = registration
outbound_auth = trunk-auth
server_uri = sip:${SIP_TRUNK_HOST}:${SIP_TRUNK_PORT}
client_uri = sip:${SIP_TRUNK_USER}@${SIP_TRUNK_HOST}
retry_interval = 60
expiration = 3600
line = yes
endpoint = trunk-endpoint

[trunk-auth]
type = auth
auth_type = userpass
username = ${SIP_TRUNK_USER}
password = ${SIP_TRUNK_PASS}
realm = ${SIP_TRUNK_REALM}

[trunk-endpoint]
type = endpoint
context = ${DEFAULT_CONTEXT}
allow = !all,ulaw,alaw,g722
outbound_auth = trunk-auth
aors = trunk-aor
direct_media = no
from_domain = ${SIP_TRUNK_HOST}
from_user = ${SIP_TRUNK_USER}
trust_id_inbound = yes
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes

[trunk-aor]
type = aor
contact = sip:${SIP_TRUNK_HOST}:${SIP_TRUNK_PORT}
qualify_frequency = 30

[trunk-identify]
type = identify
endpoint = trunk-endpoint
match = ${SIP_TRUNK_HOST}

;=============================================================================
; VOXTRA SIP ENDPOINT
; Used by Voxtra for outbound AI-originated calls via ARI originate.
;=============================================================================

[voxtra-endpoint]
type = endpoint
context = from-voxtra
allow = !all,ulaw
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
auth = voxtra-auth
aors = voxtra-aor
callerid = Luso8 AI <${OUTBOUND_CALLER_ID}>

[voxtra-auth]
type = auth
auth_type = userpass
username = voxtra
password = ${ARI_PASSWORD}

[voxtra-aor]
type = aor
max_contacts = 50

;=============================================================================
; PER-TENANT FRAGMENTS
; Generated by Voxtra TenantProvisioner for each Luso8 customer.
; Each file: /etc/asterisk/pjsip.d/<tenant_id>.conf
;=============================================================================
#include pjsip.d/*.conf
