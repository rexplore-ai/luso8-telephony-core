; Luso8 — Module Loading Configuration
; autoload=yes loads everything available from the installed package.
; Only noload= directives are used to suppress modules not needed
; for the AI call center stack. This avoids startup failures when
; a listed .so doesn't exist in the Ubuntu package.

[modules]
autoload = yes

; ============================================================
; DISABLED — not needed for AI call center
; ============================================================
noload = chan_iax2.so
noload = chan_mgcp.so
noload = chan_skinny.so
noload = chan_unistim.so
noload = chan_oss.so
noload = chan_alsa.so
noload = res_xmpp.so
noload = res_fax.so
noload = res_fax_spandsp.so
noload = res_corosync.so
noload = app_voicemail.so
noload = app_meetme.so
noload = app_festival.so
noload = app_adsiprog.so
noload = res_adsi.so
noload = res_snmp.so
noload = res_smdi.so
