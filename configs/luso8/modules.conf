; Luso8 — Module Loading Configuration
; Only loads modules required for the AI call center stack.
; Disabling unused modules reduces memory, attack surface, and startup time.

[modules]
autoload = yes

; ---- ARI (Asterisk REST Interface) — required for Voxtra ----
load = res_http_websocket.so
load = res_ari.so
load = res_ari_model.so
load = res_ari_channels.so
load = res_ari_bridges.so
load = res_ari_applications.so
load = res_ari_events.so
load = res_ari_recordings.so
load = res_ari_playbacks.so
load = res_ari_sounds.so
load = res_ari_asterisk.so
load = res_ari_endpoints.so
load = res_ari_device_states.so

; ---- Stasis (ARI application framework) ----
load = res_stasis.so
load = res_stasis_answer.so
load = res_stasis_playback.so
load = res_stasis_recording.so
load = res_stasis_snoop.so
load = res_stasis_device_state.so

; ---- AudioSocket — for direct audio streaming to/from Voxtra ----
load = res_audiosocket.so

; ---- PJSIP — SIP stack ----
load = res_pjproject.so
load = res_pjsip.so
load = res_pjsip_session.so
load = res_pjsip_outbound_registration.so
load = res_pjsip_authenticator_digest.so
load = res_pjsip_outbound_authenticator_digest.so
load = res_pjsip_endpoint_identifier_user.so
load = res_pjsip_endpoint_identifier_ip.so
load = res_pjsip_endpoint_identifier_anonymous.so
load = res_pjsip_caller_id.so
load = res_pjsip_nat.so
load = res_pjsip_logger.so
load = res_pjsip_sdp_rtp.so
load = res_pjsip_rfc3326.so
load = res_pjsip_refer.so
load = res_pjsip_registrar.so
load = res_pjsip_diversion.so
load = res_pjsip_transport_websocket.so

; ---- RTP / Media ----
load = res_rtp_asterisk.so
load = res_srtp.so

; ---- Dialplan applications ----
load = app_stasis.so
load = app_dial.so
load = app_queue.so
load = app_playback.so
load = app_record.so
load = app_verbose.so
load = app_noop.so
load = app_answer.so
load = app_hangup.so
load = app_transfer.so
load = app_confbridge.so
load = app_musiconhold.so

; ---- Codecs ----
load = codec_ulaw.so
load = codec_alaw.so
load = codec_g722.so
load = codec_resample.so

; ---- Core resources ----
load = res_musiconhold.so
load = res_timing_timerfd.so
load = res_sorcery_config.so
load = res_sorcery_memory.so
load = res_sorcery_memory_cache.so
load = res_sorcery_astdb.so
load = res_crypto.so
load = res_security_log.so

; ---- Dialplan functions ----
load = func_callerid.so
load = func_cdr.so
load = func_cut.so
load = func_db.so
load = func_dialgroup.so
load = func_env.so
load = func_logic.so
load = func_math.so
load = func_strings.so
load = func_timeout.so

; ============================================================
; DISABLED — not needed for AI call center
; ============================================================
noload = chan_iax2.so
noload = chan_mgcp.so
noload = chan_skinny.so
noload = chan_unistim.so
noload = chan_oss.so
noload = chan_alsa.so
noload = res_xmpp.so
noload = res_fax.so
noload = res_fax_spandsp.so
noload = res_corosync.so
noload = app_voicemail.so
noload = app_meetme.so
noload = app_festival.so
noload = app_adsiprog.so
noload = res_adsi.so
noload = res_snmp.so
noload = res_smdi.so
