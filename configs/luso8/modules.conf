; Luso8 — Module Loading Configuration
; autoload=yes loads everything available from the installed package.
; Only noload= directives are used to suppress modules not needed
; for the AI call center stack. This avoids startup failures when
; a listed .so doesn't exist in the Ubuntu package.

[modules]
autoload = yes

; ============================================================
; DISABLED — not needed for AI call center
; ============================================================
noload = chan_iax2.so
noload = chan_mgcp.so
noload = chan_skinny.so
noload = chan_unistim.so
noload = chan_oss.so
noload = chan_alsa.so
noload = res_xmpp.so
noload = res_fax.so
noload = res_fax_spandsp.so
noload = res_corosync.so
noload = app_voicemail.so
noload = app_meetme.so
noload = app_festival.so
noload = app_adsiprog.so
noload = res_adsi.so
noload = res_snmp.so
noload = res_smdi.so

; ============================================================
; SUPPRESSED — missing optional dependencies in Ubuntu package
; ============================================================
noload = chan_motif.so
noload = cdr_pgsql.so
noload = cdr_radius.so
noload = cdr_sqlite3_custom.so
noload = cdr_tds.so
noload = cel_radius.so
noload = cel_sqlite3_custom.so
noload = cel_tds.so
noload = pbx_dundi.so
noload = app_getcpeid.so
noload = app_voicemail_odbc.so
noload = res_hep_pjsip.so
noload = res_hep_rtcp.so
noload = res_config_pgsql.so
noload = res_config_ldap.so
noload = res_pjsip_transport_websocket.so
